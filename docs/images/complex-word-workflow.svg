<svg width="1280" height="1720" viewBox="0 0 1280 1720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="640" y1="0" x2="640" y2="1720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17191D"/>
      <stop offset="1" stop-color="#101216"/>
    </linearGradient>
    <linearGradient id="panel" x1="640" y1="36" x2="640" y2="1684" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20242A"/>
      <stop offset="1" stop-color="#1A1D22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#8EE7CF"/>
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #F5F7FA; }
      .section { font: 700 28px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #EFF3F8; }
      .step { font: 700 25px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #F5F7FA; }
      .body { font: 500 19px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #D7DEE7; }
      .small { font: 400 16px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #AAB4BF; }
      .bullet { font: 500 18px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #DCE4EC; }
      .mono { font: 600 17px Consolas, 'Courier New', monospace; fill: #DFF7EF; }
      .mutedMono { font: 600 16px Consolas, 'Courier New', monospace; fill: #C6EBDD; }
    </style>
  </defs>

  <rect width="1280" height="1720" fill="url(#bg)"/>
  <rect x="36" y="36" width="1208" height="1648" rx="30" fill="url(#panel)" stroke="#323843"/>

  <rect x="88" y="78" width="1104" height="96" rx="22" fill="#0E6A59" stroke="#2EC6A8" filter="url(#shadow)"/>
  <text x="640" y="137" text-anchor="middle" class="title">复杂 Word 状态化实现流程</text>

  <text x="108" y="226" class="section">入口与分流</text>

  <rect x="108" y="254" width="1064" height="110" rx="22" fill="#4C4D49" stroke="#7A7C75" filter="url(#shadow)"/>
  <text x="640" y="307" text-anchor="middle" class="step">1. 用户提出复杂 Word 需求</text>
  <text x="640" y="338" text-anchor="middle" class="body">例如：经营复盘、汇报材料、方案说明、带表格和结论卡片的报告</text>

  <line x1="640" y1="364" x2="640" y2="410" stroke="#8EE7CF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="108" y="410" width="1064" height="144" rx="22" fill="#165D73" stroke="#3CA5C2" filter="url(#shadow)"/>
  <text x="640" y="466" text-anchor="middle" class="step">2. before_llm_chat 动态注入工具与系统提示</text>
  <text x="640" y="500" text-anchor="middle" class="body">根据权限、群聊开关、是否 @ 机器人，决定是否暴露文件工具</text>
  <text x="640" y="530" text-anchor="middle" class="small">复杂 Word 场景下，提示模型优先走状态化工具链，而不是一次性 create_office_file</text>

  <line x1="640" y1="554" x2="640" y2="600" stroke="#8EE7CF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="108" y="600" width="1064" height="136" rx="22" fill="#4B4B47" stroke="#7C7D76" filter="url(#shadow)"/>
  <text x="640" y="654" text-anchor="middle" class="step">3. 模型判断是否进入复杂 Word 状态化流程</text>
  <text x="640" y="688" text-anchor="middle" class="body">简单文档：继续用 create_office_file</text>
  <text x="640" y="716" text-anchor="middle" class="body">复杂文档：进入 create_document → add_* → finalize → export</text>

  <line x1="640" y1="736" x2="640" y2="782" stroke="#8EE7CF" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="108" y="830" class="section">状态化文档构建</text>

  <rect x="108" y="858" width="1064" height="126" rx="22" fill="#0F6C5A" stroke="#32C8A9" filter="url(#shadow)"/>
  <text x="640" y="914" text-anchor="middle" class="step">4. create_document</text>
  <text x="640" y="947" text-anchor="middle" class="body">创建草稿会话与 document_id，并设置文档级参数</text>
  <text x="640" y="975" text-anchor="middle" class="mutedMono">theme_name / table_template / density / accent_color / output_name</text>

  <line x1="640" y1="984" x2="640" y2="1032" stroke="#8EE7CF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="108" y="1032" width="1064" height="168" rx="22" fill="#0F6C5A" stroke="#32C8A9" filter="url(#shadow)"/>
  <text x="640" y="1086" text-anchor="middle" class="step">5. 逐块追加内容</text>
  <text x="640" y="1120" text-anchor="middle" class="body">使用精细工具按顺序构建文档结构，而不是一次吐整篇文本</text>
  <text x="640" y="1152" text-anchor="middle" class="mono">add_heading</text>
  <text x="640" y="1180" text-anchor="middle" class="mono">add_paragraph / add_table / add_summary_card</text>

  <line x1="640" y1="1200" x2="640" y2="1248" stroke="#8EE7CF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="108" y="1248" width="1064" height="132" rx="22" fill="#0F6C5A" stroke="#32C8A9" filter="url(#shadow)"/>
  <text x="640" y="1302" text-anchor="middle" class="step">6. DocumentSessionStore 持有草稿状态</text>
  <text x="640" y="1336" text-anchor="middle" class="body">每次 add_* 都落到统一 store，最终形成完整 DocumentModel</text>
  <text x="640" y="1364" text-anchor="middle" class="small">标题、正文、表格、摘要卡片、结论卡片都作为结构化块保存</text>

  <line x1="640" y1="1380" x2="640" y2="1428" stroke="#8EE7CF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="108" y="1428" width="1064" height="114" rx="22" fill="#3D7610" stroke="#8DDA43" filter="url(#shadow)"/>
  <text x="640" y="1482" text-anchor="middle" class="step">7. finalize_document → export_document</text>
  <text x="640" y="1516" text-anchor="middle" class="body">WordBuilder 根据 DocumentModel 渲染 .docx，并输出到工作区</text>

  <line x1="640" y1="1542" x2="640" y2="1588" stroke="#8EE7CF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="108" y="1588" width="1064" height="60" rx="20" fill="#3D7610" stroke="#8DDA43" filter="url(#shadow)"/>
  <text x="640" y="1627" text-anchor="middle" class="body">_handle_exported_document_tool 发送 Word 文件与预览图给用户</text>

  <text x="108" y="1676" class="bullet">策略：如果多轮工具调用中途失败，优先重新生成新文档，不继续污染旧草稿。</text>
</svg>
